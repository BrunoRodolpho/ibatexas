name: Deploy — Staging

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build + push Docker images to ECR
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, admin, commerce]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2
        id: ecr

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      # NEXT_PUBLIC_* vars must be available at docker build time for Next.js
      # to inline them into the client bundle. Empty args are fine (Docker
      # treats them as unset), so passing web-only args to the api build is
      # harmless. Values are the Caddy-fronted HTTPS origins.
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/ibatexas-${{ matrix.service }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/ibatexas-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.ibatexas.com.br
            NEXT_PUBLIC_APP_URL=https://ibatexas.com.br
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://commerce.ibatexas.com.br
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

  # ---------------------------------------------------------------------------
  # 2. Run Prisma migrations against the dev DB (Supabase session pooler)
  # ---------------------------------------------------------------------------
  migrate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Cross-repo workspace include — see ci.yml for context.
      - name: Checkout adjudicate sibling repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: BrunoRodolpho/adjudicate
          ref: main
          path: __adjudicate__
      - name: Position adjudicate at parent path expected by pnpm-workspace.yaml
        run: mv __adjudicate__ ../adjudicate

      - uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ibatexas/domain db:generate

      - name: Run Prisma migrations
        run: pnpm --filter @ibatexas/domain exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DIRECT_DATABASE_URL }}

  # Note: Medusa migrations are run manually from a workstation when schema
  # changes land. `medusa db:migrate` hangs indefinitely in GitHub-hosted
  # runners (observed 5+ min with no tables created) — hypothesis is DNS or
  # network quirks between the runner and the Supabase pooler. Running the
  # same command from a laptop with the same STAGING_DIRECT_DATABASE_URL
  # completes in ~15s. Until we figure out the CI-specific difference, the
  # explicit manual step is the contract.

  # ---------------------------------------------------------------------------
  # 3. Deploy to the dev EC2 host via SSM Run Command
  #    Replaces the ECS Fargate rolling update with a single `docker compose
  #    pull && up -d` on the single-VM dev stack.
  # ---------------------------------------------------------------------------
  deploy:
    needs: [build, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find dev host instance
        id: host
        run: |
          ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Role,Values=ibatexas-${{ env.ENVIRONMENT }}-host" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::no running instance found with tag Role=ibatexas-${{ env.ENVIRONMENT }}-host"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy on host
        id: send
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.host.outputs.id }}" \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":["/usr/local/bin/ibatexas-deploy"]}' \
            --timeout-seconds 900 \
            --comment "GitHub Actions deploy ${{ github.sha }}" \
            --query 'Command.CommandId' \
            --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Deploy command sent: $CMD_ID"

      - name: Wait for deploy to finish
        run: |
          CMD_ID="${{ steps.send.outputs.cmd_id }}"
          INSTANCE_ID="${{ steps.host.outputs.id }}"
          for i in $(seq 1 60); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "InProgress")
            echo "[$i/60] status: $STATUS"
            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::deploy failed with status $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' --output text
                exit 1 ;;
            esac
          done
          echo "::error::timed out waiting for deploy after 15 minutes"
          exit 1

  # ---------------------------------------------------------------------------
  # 4. Health check — poll HTTPS endpoints until they respond 2xx/3xx
  # ---------------------------------------------------------------------------
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for container warm-up
        run: sleep 60

      - name: Probe all public URLs
        run: |
          URLS=(
            "https://ibatexas.com.br/"
            "https://api.ibatexas.com.br/health"
            "https://admin.ibatexas.com.br/"
            "https://commerce.ibatexas.com.br/health"
          )
          for url in "${URLS[@]}"; do
            echo "Checking $url"
            if ! curl -fsS --retry 5 --retry-delay 15 --max-time 30 -o /dev/null "$url"; then
              echo "::error::$url did not return a 2xx/3xx response"
              exit 1
            fi
            echo "  ✓ $url"
          done
