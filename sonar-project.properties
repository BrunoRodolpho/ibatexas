sonar.organization=brunorodolpho
sonar.projectKey=BrunoRodolpho_ibatexas
sonar.projectName=IbateXas

# Sources — all app and package src directories
sonar.sources=apps/api/src,apps/web/src,apps/admin/src,apps/agent/src,apps/commerce/src,packages/cli/src,packages/tools/src,packages/domain/src,packages/types/src,packages/nats-client/src,packages/llm-provider/src,packages/ui/src

# Tests
sonar.tests=apps/api/src,apps/web/src,apps/admin/src,apps/agent/src,packages/cli/src,packages/tools/src,packages/nats-client/src,packages/llm-provider/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (vitest + v8 lcov output)
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info

# Exclusions — generated code, configs, build artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.medusa/**,**/generated/**,**/*.config.ts,**/*.config.mjs,**/*.config.js,**/coverage/**,docker-compose.yml

# Coverage exclusions — files excluded from coverage % calculation only
# (still analyzed for bugs/smells, just not counted in coverage metric)
sonar.coverage.exclusions=\
  **/index.ts,\
  **/*.d.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  apps/web/src/app/**/page.tsx,\
  apps/web/src/app/**/layout.tsx,\
  apps/web/src/app/**/loading.tsx,\
  apps/web/src/app/**/error.tsx,\
  apps/web/src/app/**/not-found.tsx,\
  apps/admin/src/app/**/page.tsx,\
  apps/admin/src/app/**/layout.tsx,\
  packages/domain/src/**,\
  packages/types/src/**,\
  packages/ui/src/**

# Encoding
sonar.sourceEncoding=UTF-8
