sonar.organization=brunorodolpho
sonar.projectKey=BrunoRodolpho_ibatexas
sonar.projectName=IbateXas

# Sources — all app and package src directories
sonar.sources=apps/api/src,apps/web/src,apps/admin/src,apps/commerce/src,packages/cli/src,packages/tools/src,packages/domain/src,packages/types/src,packages/nats-client/src,packages/llm-provider/src,packages/ui/src

# Tests
sonar.tests=apps/api/src,apps/web/src,apps/admin/src,packages/cli/src,packages/tools/src,packages/nats-client/src,packages/llm-provider/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (vitest + v8 lcov output)
sonar.javascript.lcov.reportPaths=apps/*/coverage/lcov.info,packages/*/coverage/lcov.info

# Exclusions — generated code, configs, build artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.medusa/**,**/generated/**,**/*.config.ts,**/*.config.mjs,**/*.config.js,**/coverage/**,docker-compose.yml

# Coverage exclusions — files excluded from coverage % calculation only
# (still analyzed for bugs/smells, just not counted in coverage metric)
sonar.coverage.exclusions=\
  **/index.ts,\
  **/*.d.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/__tests__/**,\
  apps/web/src/**,\
  apps/admin/src/**,\
  apps/commerce/src/**,\
  apps/api/src/routes/**,\
  apps/api/src/jobs/**,\
  apps/api/src/subscribers/**,\
  apps/api/src/whatsapp/**,\
  apps/api/src/session/**,\
  apps/api/src/errors/**,\
  apps/api/src/streaming/**,\
  packages/domain/src/**,\
  packages/types/src/**,\
  packages/ui/src/**,\
  packages/cli/src/**,\
  packages/llm-provider/src/**,\
  packages/tools/src/typesense/client.ts,\
  packages/tools/src/mappers/**,\
  packages/tools/src/intelligence/types.ts,\
  packages/tools/src/medusa/client.ts,\
  packages/tools/src/embeddings/client.ts,\
  packages/tools/src/cache/embedding-cache.ts,\
  packages/tools/src/cache/query-cache.ts,\
  packages/tools/src/catalog/estimate-delivery.ts,\
  packages/tools/src/redis/client.ts,\
  packages/tools/src/reservation/notifications.ts,\
  packages/tools/src/whatsapp/**,\
  packages/tools/src/api/**,\
  packages/nats-client/src/**

# Encoding
sonar.sourceEncoding=UTF-8
